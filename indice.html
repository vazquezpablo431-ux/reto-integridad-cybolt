<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pon a prueba tu integridad | Cybolt</title>
<meta name="description" content="Dinámica de sensibilización sobre cultura de integridad, anticorrupción y antisoborno.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2314203A'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23E8743B'/%3E%3C/svg%3E">

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-KYDMKNT4Q2');

/* Eventos anónimos de uso del juego.
   No envían nombres, respuestas ni resultados individuales. */
function trackEvent(eventName, parameters = {}) {
  if (typeof window.gtag === 'function') {
    window.gtag('event', eventName, parameters);
  }
}

<style>
  :root{
    --orange:#E8743B; --orange-dk:#C85A28;
    --navy:#14203A; --navy-2:#1E2E4E;
    --bg:#F6F4EF; --ink:#1B2233; --muted:#6A7180;
    --line:#E4E0D7; --orange-soft:#FBE8DD; --navy-soft:#EBEEF4;
    --green:#2E9E6B; --green-soft:#E3F4EC; --lime:#7FB03F; --amber:#E0A32E; --amber-soft:#FBF1DD; --alert:#E8743B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px 16px; -webkit-font-smoothing:antialiased;
  }
  .app{width:100%;max-width:580px}
  .card{
    background:#fff; border:1px solid var(--line); border-radius:20px; overflow:hidden;
    box-shadow:0 18px 50px -24px rgba(20,32,58,.35);
  }
  /* Top bar */
  .topbar{
    background:var(--navy); color:#fff; padding:16px 22px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-family:'Sora';font-weight:700;letter-spacing:-.01em;font-size:15px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 4px rgba(232,116,59,.22)}
  .brand small{display:block;font-family:'Inter';font-weight:500;font-size:10.5px;color:#9aa3b8;letter-spacing:.05em;text-transform:uppercase}
  .tag{font-size:11px;font-weight:600;color:#cdd4e4;background:rgba(255,255,255,.08);padding:6px 11px;border-radius:999px;white-space:nowrap}

  /* Progress */
  .progress-wrap{padding:16px 22px 0;display:none}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .p-block{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--orange-dk)}
  .p-count{font-family:'Sora';font-weight:700;font-size:12px;color:var(--muted)}
  .p-bar{height:8px;background:#EFECE4;border-radius:999px;overflow:hidden}
  .p-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--orange),#F0A06B);border-radius:999px;transition:width .45s cubic-bezier(.22,1,.36,1)}

  .body{padding:26px 24px 28px}

  /* Buttons */
  .btn{
    width:100%;border:none;cursor:pointer;font-family:'Sora';font-weight:700;font-size:16px;
    background:var(--orange);color:#fff;padding:15px 20px;border-radius:13px;
    transition:transform .12s ease, box-shadow .2s ease, background .2s;
    box-shadow:0 10px 24px -10px rgba(232,116,59,.7);
  }
  .btn:hover{transform:translateY(-1px);background:#e0682c}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:var(--navy);box-shadow:0 10px 24px -12px rgba(20,32,58,.6)}
  .btn.ghost:hover{background:var(--navy-2)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .btn:focus-visible{outline:3px solid #F4C39E;outline-offset:2px}

  /* Intro */
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);margin-bottom:12px}
  h1{font-family:'Sora';font-weight:800;font-size:29px;line-height:1.08;letter-spacing:-.02em;margin-bottom:14px}
  h1 .hl{color:var(--orange)}
  .intro-p{color:var(--ink);font-size:15px;line-height:1.6;margin-bottom:14px}
  .note{
    background:var(--navy-soft);border-left:4px solid var(--navy);border-radius:11px;
    padding:13px 15px;font-size:13px;line-height:1.55;color:#3d4658;margin:6px 0 14px;
  }
  .note b{color:var(--navy)}
  .privacy{font-size:12px;line-height:1.5;color:var(--muted);text-align:center;margin:0 0 22px}
  .privacy b{color:var(--navy)}
  .mini-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .chip{font-size:11.5px;font-weight:600;color:var(--navy);background:var(--orange-soft);padding:6px 11px;border-radius:999px}

  /* Question */
  .qblock{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .qtext{font-family:'Sora';font-weight:600;font-size:20px;line-height:1.32;letter-spacing:-.01em;margin-bottom:20px}
  .options{display:flex;flex-direction:column;gap:11px}
  .opt{
    text-align:left;cursor:pointer;background:#fff;border:1.5px solid var(--line);border-radius:13px;
    padding:14px 15px;font-family:'Inter';font-size:14.5px;font-weight:500;color:var(--ink);
    display:flex;align-items:center;gap:12px;transition:border-color .15s, background .15s, transform .1s;
  }
  .opt:hover:not(:disabled){border-color:var(--orange);background:#FFFBF8}
  .opt:disabled{cursor:default}
  .opt:focus-visible{outline:3px solid #F4C39E;outline-offset:2px}
  .opt .key{
    width:26px;height:26px;flex:0 0 26px;border-radius:8px;background:var(--bg);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:700;font-size:13px;color:var(--muted);
    transition:all .15s;
  }
  .opt.pick-correct{border-color:var(--green);background:var(--green-soft);animation:tap .28s ease}
  .opt.pick-correct .key{background:var(--green);border-color:var(--green);color:#fff}
  .opt.pick-wrong{border-color:var(--amber);background:var(--amber-soft);animation:tap .28s ease}
  .opt.pick-wrong .key{background:var(--amber);border-color:var(--amber);color:#fff}
  .opt.dim{opacity:.5}
  @keyframes tap{0%{transform:scale(1)}45%{transform:scale(.985)}100%{transform:scale(1)}}

  /* Feedback after answering */
  .feedback{margin-top:18px;padding:14px 16px;border-radius:12px;font-size:13.8px;line-height:1.55;display:none}
  .feedback.show{display:block;animation:rise .3s ease}
  .feedback.correct{background:var(--green-soft);border-left:4px solid var(--green);color:#1e5c3d}
  .feedback.reflect{background:var(--orange-soft);border-left:4px solid var(--orange);color:#5a3c2a}
  .feedback b{font-weight:700}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .next-row{margin-top:18px;display:none}
  .next-row.show{display:block}

  /* Result */
  .result{text-align:center}
  .r-emoji{font-size:44px;margin-bottom:6px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  .r-level{font-family:'Sora';font-weight:800;font-size:24px;letter-spacing:-.01em;margin-bottom:6px}
  .r-score-big{font-family:'Sora';font-weight:800;font-size:40px;letter-spacing:-.02em;color:var(--navy);margin-bottom:16px}
  .r-score-big span{color:var(--orange)}
  .meter-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .meter-label span:first-child{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .meter-label span:last-child{font-family:'Sora';font-weight:800;font-size:16px}
  .r-meter{height:14px;background:#EFECE4;border-radius:999px;overflow:hidden;margin-bottom:20px}
  .r-fill{height:100%;width:0%;border-radius:999px;transition:width .9s cubic-bezier(.22,1,.36,1)}
  .r-msg{background:var(--bg);border-radius:13px;padding:16px 18px;font-size:14.5px;line-height:1.6;color:var(--ink);text-align:left;margin-bottom:14px}
  .r-disc{background:var(--navy);color:#dce2ee;border-radius:11px;padding:13px 16px;font-size:12.5px;line-height:1.55;text-align:left;margin-bottom:20px}
  .r-disc b{color:var(--orange)}
  .actions{display:flex;flex-direction:column;gap:10px}

  .foot{text-align:center;font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5}

  @media (max-width:480px){
    .body{padding:22px 18px 24px}
    h1{font-size:25px}
    .qtext{font-size:18px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="topbar">
      <div class="brand"><span class="dot"></span><span>Cybolt<small>Cultura de integridad</small></span></div>
      <div class="tag" id="topTag">Dinámica de sensibilización</div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-top">
        <span class="p-block" id="pBlock">Cultura de integridad</span>
        <span class="p-count" id="pCount">0 / 10</span>
      </div>
      <div class="p-bar"><div class="p-fill" id="pFill"></div></div>
    </div>

    <div class="body" id="body"><!-- pantallas inyectadas --></div>
  </div>
  <p class="foot">Dinámica interna de sensibilización · Cybolt · Cultura de integridad, anticorrupción y antisoborno.</p>
</div>

<script>
/* =========================================================================
   ====== AQUÍ SE EDITAN LAS PREGUNTAS Y LAS REFLEXIONES ======
   Cada pregunta tiene 3 opciones. La opción correcta lleva points: 1
   (las demás points: 0, incluida la de tipo "trampa").
   Cada opción tiene su propio "feedback": si es correcta se muestra como
   confirmación; si es incorrecta se muestra bajo la etiqueta "Reflexión:".
   ========================================================================= */
const QUESTIONS = [
  {
    q: "¿Alguna vez has dado o considerado dar una \u201Cmordida\u201D para evitar una multa?",
    options: [
      { text: "No.", points: 1, feedback: "¡Bien! Elegir el camino correcto, incluso cuando parece más largo o complicado, fortalece una cultura de legalidad e integridad." },
      { text: "Sí.", points: 0, feedback: "Dar o considerar una \u201Cmordida\u201D contribuye a mantener prácticas de corrupción que afectan la confianza y la equidad para todas las personas." },
      { text: "\u201CTodo el mundo lo hace.\u201D", points: 0, feedback: "Que una práctica sea común no la hace correcta. La corrupción suele comenzar cuando normalizamos conductas indebidas." },
    ]
  },
  {
    q: "¿Alguna vez has usado una influencia o \u201Cpalanca\u201D para obtener un trato preferencial?",
    options: [
      { text: "No.", points: 1, feedback: "¡Excelente! Respetar los procedimientos garantiza igualdad de oportunidades para todas las personas." },
      { text: "Sí.", points: 0, feedback: "Obtener un beneficio por relaciones personales puede afectar la imparcialidad y generar ventajas injustas." },
      { text: "\u201CSolo si me lo ofrecen, yo no lo pediría.\u201D", points: 0, feedback: "Aunque no lo solicitemos, cuando obtenemos un beneficio por nuestras relaciones y no por el procedimiento establecido, generamos una ventaja injusta para otras personas." },
    ]
  },
  {
    q: "¿Alguna vez has visto una conducta poco ética y decidiste no decir nada para evitar problemas?",
    options: [
      { text: "No.", points: 1, feedback: "¡Muy bien! Hablar cuando observamos una conducta incorrecta ayuda a construir una cultura de confianza e integridad." },
      { text: "Sí.", points: 0, feedback: "El silencio puede permitir que una conducta indebida continúe o incluso se repita." },
      { text: "\u201CNo era asunto mío.\u201D", points: 0, feedback: "Guardar silencio también puede permitir que una conducta incorrecta continúe. Promover la integridad implica actuar de forma responsable." },
    ]
  },
  {
    q: "¿Alguna vez entregaste un trabajo tomado de internet como si fuera tuyo?",
    options: [
      { text: "No.", points: 1, feedback: "¡Excelente! Reconocer el trabajo y las ideas de otras personas demuestra honestidad y respeto." },
      { text: "Sí.", points: 0, feedback: "Presentar como propio el trabajo ajeno afecta la confianza y la credibilidad." },
      { text: "\u201CParafraseé todo, así no cuenta.\u201D", points: 0, feedback: "Presentar el trabajo de otra persona como propio afecta la honestidad y el reconocimiento del esfuerzo ajeno." },
    ]
  },
  {
    q: "¿Alguna vez compartiste una cuenta de una plataforma cuando los términos no lo permitían?",
    options: [
      { text: "No.", points: 1, feedback: "¡Bien hecho! Respetar los acuerdos y condiciones de uso también es una forma de actuar con integridad." },
      { text: "Sí.", points: 0, feedback: "Aunque parezca una acción menor, incumplir las condiciones de uso significa no respetar los acuerdos establecidos." },
      { text: "\u201CNo se van a dar cuenta.\u201D", points: 0, feedback: "Respetar las condiciones de uso también es una forma de actuar con integridad y de cumplir los acuerdos establecidos." },
    ]
  },
  {
    q: "¿Alguna vez te has pasado un semáforo o le sugeriste a alguien que lo hiciera porque \u201Cno venía nadie\u201D?",
    options: [
      { text: "No.", points: 1, feedback: "¡Excelente! Cumplir las reglas protege tu seguridad y la de los demás." },
      { text: "Sí.", points: 0, feedback: "Ignorar las normas puede poner en riesgo a otras personas, incluso cuando el peligro no es evidente." },
      { text: "\u201CSolo se hace cuando no se le hace daño a nadie.\u201D", points: 0, feedback: "Las reglas existen para proteger a todas las personas, incluso cuando creemos que nadie resultará afectado." },
    ]
  },
  {
    q: "¿Alguna vez has pedido a alguien que \u201Cte haga el favor\u201D de agilizar un trámite por tener conocidos?",
    options: [
      { text: "No.", points: 1, feedback: "¡Muy bien! Respetar los procedimientos promueve la igualdad y la transparencia." },
      { text: "Sí.", points: 0, feedback: "Obtener un trato preferencial afecta la equidad y la confianza en los procesos." },
      { text: "\u201CSolo era un favor, yo lo haría por alguien más.\u201D", points: 0, feedback: "Los favores personales pueden convertirse en privilegios indebidos cuando afectan la igualdad de trato." },
    ]
  },
  {
    q: "¿Alguna vez ocultaste un error para evitar una consecuencia?",
    options: [
      { text: "No.", points: 1, feedback: "¡Excelente! Reconocer un error permite corregirlo, aprender y fortalecer la confianza." },
      { text: "Sí.", points: 0, feedback: "Ocultar un error suele generar consecuencias mayores y dificulta encontrar soluciones a tiempo." },
      { text: "\u201CSí, pero porque sabía que no había problemas.\u201D", points: 0, feedback: "Reconocer los errores permite corregirlos y aprender de ellos. Ocultarlos puede generar consecuencias mayores." },
    ]
  },
  {
    q: "¿Alguna vez te cobraron menos y decidiste no decir nada?",
    options: [
      { text: "No.", points: 1, feedback: "¡Bien hecho! La honestidad también se demuestra cuando un error juega a nuestro favor." },
      { text: "Sí.", points: 0, feedback: "Actuar con integridad implica hacer lo correcto, incluso cuando podríamos obtener un beneficio." },
      { text: "\u201CNo fue mi error.\u201D", points: 0, feedback: "La honestidad también se demuestra cuando un error nos beneficia. Actuar con integridad implica hacer lo correcto, incluso si nadie lo espera." },
    ]
  },
  {
    q: "¿Alguna vez aceptaste un beneficio sabiendo que no cumplías con los requisitos para recibirlo?",
    options: [
      { text: "No.", points: 1, feedback: "¡Excelente! Respetar las reglas contribuye a que las oportunidades sean justas para todas las personas." },
      { text: "Sí.", points: 0, feedback: "Aceptar un beneficio que no nos corresponde puede afectar la confianza y la equidad." },
      { text: "\u201CSi me lo dieron, por algo será.\u201D", points: 0, feedback: "Aceptar beneficios que no nos corresponden afecta la equidad y perjudica a quienes sí cumplen con los requisitos." },
    ]
  },
];

/* =========================================================================
   ====== AQUÍ SE EDITAN LOS NIVELES DE RESULTADO ======
   Se elige por el puntaje obtenido (0 a 10).
   ========================================================================= */
const LEVELS = [
  { min: 10, max: 10, emoji: "🏅", title: "Embajador de la Integridad", color: "var(--green)",
    msg: "Tomas decisiones éticas incluso cuando nadie está mirando. Tu resultado refleja una conducta alineada con la integridad, la transparencia y la responsabilidad." },
  { min: 7, max: 9, emoji: "👍", title: "Vas por buen camino", color: "var(--lime)",
    msg: "Tu resultado muestra una buena orientación ética. Aun así, hay situaciones en las que conviene detenerse, conocer mejor las políticas y analizar antes de decidir." },
  { min: 0, max: 6, emoji: "🧭", title: "¡Alerta!", color: "var(--alert)",
    msg: "La corrupción no siempre comienza con grandes fraudes; muchas veces empieza con pequeñas decisiones que parecen inofensivas. Reflexiona sobre tus decisiones y fortalece tu compromiso con la integridad." },
];

/* ============================ ESTADO ============================ */
let currentIndex = 0;
let score = 0;
let answered = false;
const TOTAL = QUESTIONS.length; // 10

const body = document.getElementById('body');
const progressWrap = document.getElementById('progressWrap');
const pFill = document.getElementById('pFill');
const pCount = document.getElementById('pCount');
const pBlock = document.getElementById('pBlock');
const topTag = document.getElementById('topTag');

/* ========================= PANTALLA INTRO ========================= */
function renderIntro(){
  progressWrap.style.display = "none";
  topTag.textContent = "Dinámica de sensibilización";
  body.innerHTML = `
    <div class="eyebrow">Cultura de integridad · anticorrupción y antisoborno</div>
    <h1>Pon a prueba tu <span class="hl">integridad</span></h1>
    <p class="intro-p">Esta dinámica refuerza la cultura de integridad, anticorrupción y antisoborno mediante situaciones cotidianas. A través de 10 preguntas rápidas, podrás reflexionar sobre pequeñas decisiones que pueden fortalecer o debilitar la ética personal y profesional.</p>
    <div class="note"><b>El resultado es únicamente lúdico y de sensibilización.</b> No representa una evaluación laboral, un diagnóstico personal ni un registro individual.</div>
    <p class="privacy">🔒 <b>Este juego no guarda respuestas, no registra usuarios y no conserva resultados individuales.</b></p>
    <div class="mini-legend">
      <span class="chip">10 preguntas</span>
      <span class="chip">~3 minutos</span>
      <span class="chip">Anónimo</span>
    </div>
    <button class="btn" id="startBtn">Iniciar evaluación</button>
  `;
  document.getElementById('startBtn').addEventListener('click', startGame);
}

/* ========================= INICIAR JUEGO ========================= */
function startGame(){
  trackEvent('game_started');
  currentIndex = 0;
  score = 0;
  progressWrap.style.display = "block";
  topTag.textContent = "En curso";
  renderQuestion();
}

/* ======================== RENDER PREGUNTA ======================== */
function renderQuestion(){
  const item = QUESTIONS[currentIndex];
  const keys = ["A","B","C"];
  answered = false;

  pFill.style.width = (currentIndex / TOTAL * 100) + "%";
  pCount.textContent = (currentIndex + 1) + " / " + TOTAL;

  body.innerHTML = `
    <div class="qblock">Pregunta ${currentIndex + 1} de ${TOTAL}</div>
    <div class="qtext">${item.q}</div>
    <div class="options" id="options">
      ${item.options.map((o, idx) => `
        <button class="opt" data-idx="${idx}">
          <span class="key">${keys[idx]}</span><span>${o.text}</span>
        </button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="next-row" id="nextRow">
      <button class="btn ghost" id="nextBtn">${currentIndex === TOTAL - 1 ? 'Ver mi resultado' : 'Siguiente'}</button>
    </div>
  `;
  body.querySelectorAll('.opt').forEach(btn => btn.addEventListener('click', () => selectOption(parseInt(btn.dataset.idx))));
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
}

/* =================== SELECCIONAR + RETROALIMENTAR =================== */
function selectOption(idx){
  if(answered) return;              // impide cambiar la respuesta
  answered = true;
  const item = QUESTIONS[currentIndex];
  const chosen = item.options[idx];
  const isCorrect = chosen.points === 1;

  if(isCorrect) score += 1;         // <-- suma el punto del acierto

  const opts = body.querySelectorAll('.opt');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if(i === idx) btn.classList.add(isCorrect ? 'pick-correct' : 'pick-wrong');
    else btn.classList.add('dim');
  });

  const fb = document.getElementById('feedback');
  if(isCorrect){
    fb.className = "feedback correct show";
    fb.innerHTML = "✅ " + chosen.feedback;
  } else {
    fb.className = "feedback reflect show";
    fb.innerHTML = "<b>Reflexión:</b> " + chosen.feedback;
  }
  document.getElementById('nextRow').classList.add('show');  // solo avanza al leer la reflexión
}

/* ========================= SIGUIENTE / FIN ========================= */
function nextQuestion(){
  if(!answered) return;
  currentIndex++;
  if(currentIndex < TOTAL) renderQuestion();
  else renderResult();
}

/* =========================================================================
   ====== AQUÍ SE CALCULA EL PUNTAJE FINAL ======
   El puntaje es la suma de aciertos (0 a 10). El nivel se elige por rango.
   ========================================================================= */
function computeResult(){
  const level = LEVELS.find(l => score >= l.min && score <= l.max) || LEVELS[LEVELS.length - 1];
  return { score, total: TOTAL, level };
}

/* ========================= PANTALLA FINAL ========================= */
function renderResult(){
  trackEvent('game_finished');
  pFill.style.width = "100%";
  progressWrap.style.display = "none";
  topTag.textContent = "Resultado";
  const { score, total, level } = computeResult();
  const pct = Math.round(score / total * 100);

  body.innerHTML = `
    <div class="result">
      <div class="r-emoji">${level.emoji}</div>
      <div class="r-level" style="color:${level.color}">${level.title}</div>
      <div class="r-score-big"><span>${score}</span>/${total}</div>

      <div class="meter-label">
        <span>Puntaje de integridad</span>
        <span style="color:${level.color}">${score}/${total}</span>
      </div>
      <div class="r-meter"><div class="r-fill" id="rFill" style="background:${level.color}"></div></div>

      <div class="r-msg">${level.msg}</div>
      <div class="r-disc"><b>Recuerda:</b> este resultado es únicamente una dinámica de sensibilización. La integridad se construye con decisiones pequeñas, evidencia clara y cero atajos raros.</div>

      <div class="actions">
        <button class="btn" id="retryBtn">Volver a empezar</button>
        <button class="btn ghost" id="shareBtn">Compartir resultado</button>
      </div>
    </div>
  `;
  requestAnimationFrame(() => { document.getElementById('rFill').style.width = pct + "%"; });
  document.getElementById('retryBtn').addEventListener('click', () => {
    trackEvent('restart_game');
    renderIntro();
  });
  document.getElementById('shareBtn').addEventListener('click', () => shareResult(score, total, level.title));
}

/* ======================= COMPARTIR / COPIAR ======================= */
function shareResult(score, total, levelTitle){
  trackEvent('share_result');
  const text = `Jugué \u2018Pon a prueba tu integridad\u2019 de Cybolt.\nResultado: ${score}/${total}.\nNivel: ${levelTitle}.\nDinámica de sensibilización sobre cultura de integridad, anticorrupción y antisoborno.`;
  const btn = document.getElementById('shareBtn');
  if(navigator.share){
    navigator.share({ title: "Pon a prueba tu integridad | Cybolt", text }).catch(() => {});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(() => {
      const prev = btn.textContent;
      btn.textContent = "¡Copiado! Pégalo en Teams ✓";
      setTimeout(() => { btn.textContent = prev; }, 2200);
    }).catch(() => { btn.textContent = "Tu nivel: " + levelTitle; });
  } else {
    btn.textContent = "Tu nivel: " + levelTitle;
  }
}

/* ============================ ARRANQUE ============================ */
renderIntro();
</script>
</body>
</html>
